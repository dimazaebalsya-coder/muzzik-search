<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Дмитрий Носков | Фотограф событий и студии</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FAF7F2;
      font-family: 'Montserrat', sans-serif;
      color: #2C2A29;
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .hero {
      padding: 56px 0 48px 0;
      text-align: center;
      border-bottom: 1px solid #E8DDD2;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #8B6F4C;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 0.9rem;
      font-weight: 500;
      color: #7A6B5D;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .tagline:before, .tagline:after {
      content: "";
      width: 30px;
      height: 1px;
      background: #DBCBBC;
      display: inline-block;
    }

    .categories {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 32px 0 28px;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: transparent;
      border: 1px solid #E1D4C8;
      padding: 8px 22px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #5F5042;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Montserrat', sans-serif;
    }
    .cat-btn.active, .cat-btn:hover {
      background: #DCCFBF;
      border-color: #C1AB93;
      color: #2E2A26;
    }

    .gallery {
      margin: 20px 0 60px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 24px;
      grid-auto-flow: dense;
    }
    .gallery-item {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background-color: #EDE4DA;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.03);
    }

    .item-tall {
      grid-row: span 2;
      min-height: 500px;
    }
    .item-wide {
      grid-column: span 2;
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
      padding: 20px 18px 12px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .gallery-item:hover .photo-overlay {
      opacity: 1;
    }
    .photo-overlay span {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #F8F1E9;
      text-transform: uppercase;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(20, 18, 16, 0.94);
      backdrop-filter: blur(6px);
      z-index: 1100;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .modal.active {
      display: flex;
      animation: fadeModal 0.2s ease;
    }
    .modal-content {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,245,235,0.5);
    }
    .modal-close {
      position: absolute;
      top: 28px;
      right: 36px;
      font-size: 2rem;
      color: #E9DBCF;
      background: rgba(0,0,0,0.4);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      cursor: pointer;
    }
    .modal-close:hover {
      background: rgba(0,0,0,0.7);
      color: white;
    }
    @keyframes fadeModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    footer {
      text-align: center;
      padding: 32px 0 48px;
      border-top: 1px solid #E6D9CF;
      color: #A19181;
      font-size: 0.75rem;
      font-weight: 400;
    }

    @media (max-width: 760px) {
      .container { padding: 0 18px; }
      .gallery-grid { gap: 16px; }
      .item-tall, .item-wide, .item-large {
        grid-row: auto;
        grid-column: auto;
        min-height: auto;
      }
      .logo { font-size: 2.3rem; }
      .cat-btn { padding: 6px 18px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="hero">
    <div class="logo">Дмитрий Носков</div>
    <div class="tagline">свадьбы · события · студия</div>
  </header>

  <div class="categories">
    <button class="cat-btn active" data-filter="all">все работы</button>
    <button class="cat-btn" data-filter="wedding">💍 свадьбы</button>
    <button class="cat-btn" data-filter="event">🥂 мероприятия</button>
    <button class="cat-btn" data-filter="studio">📷 студия / портрет</button>
  </div>

  <div class="gallery">
    <div id="galleryContainer" class="gallery-grid"></div>
  </div>

  <footer>
    <i class="fa-regular fa-camera"></i> Дмитрий Носков — репортажная и постановочная съёмка. Моменты, которые остаются навсегда.
  </footer>
</div>

<div id="imageModal" class="modal">
  <span class="modal-close">&times;</span>
  <img class="modal-content" id="modalImg" alt="Детальный просмотр">
</div>

<script>
  // ВАШИ ФОТОГРАФИИ - свадьбы и мероприятия
  const portfolioItems = [
    // ===== СВАДЬБЫ (wedding) =====
    { src: 'images/wedding_7179.jpg', category: 'wedding', typeHint: 'portrait', alt: 'Свадебная фотосессия' },
    { src: 'images/wedding_7180.jpg', category: 'wedding', typeHint: 'landscape', alt: 'Свадебный портрет' },
    { src: 'images/wedding_7181.jpg', category: 'wedding', typeHint: 'portrait', alt: 'Эмоции молодоженов' },
    { src: 'images/wedding_7182.jpg', category: 'wedding', typeHint: 'landscape', alt: 'Свадебная церемония' },
    { src: 'images/wedding_7183.jpg', category: 'wedding', typeHint: 'portrait', alt: 'Невеста' },
    { src: 'images/wedding_7184.jpg', category: 'wedding', typeHint: 'square', alt: 'Свадебные детали' },
    { src: 'images/wedding_7185.jpg', category: 'wedding', typeHint: 'landscape', alt: 'Прогулка молодоженов' },
    { src: 'images/wedding_7186.jpg', category: 'wedding', typeHint: 'portrait', alt: 'Свадебный танец' },
    { src: 'images/wedding_7187.jpg', category: 'wedding', typeHint: 'landscape', alt: 'Фотосессия на закате' },
    { src: 'images/wedding_7188.jpg', category: 'wedding', typeHint: 'portrait', alt: 'Кольца и букет' },
    { src: 'images/wedding_7189.jpg', category: 'wedding', typeHint: 'square', alt: 'Свадебное торжество' },

    // ===== МЕРОПРИЯТИЯ (event) =====
    { src: 'images/event_1.jpg', category: 'event', typeHint: 'landscape', alt: 'Корпоративное мероприятие' },
    { src: 'images/event_2.jpg', category: 'event', typeHint: 'portrait', alt: 'Гости события' },
    { src: 'images/event_3.jpg', category: 'event', typeHint: 'landscape', alt: 'Выступление на сцене' },
    { src: 'images/event_4.jpg', category: 'event', typeHint: 'square', alt: 'Фуршет и общение' },
    { src: 'images/event_27.jpg', category: 'event', typeHint: 'portrait', alt: 'Ключевой момент мероприятия' },
    { src: 'images/event_29.jpg', category: 'event', typeHint: 'landscape', alt: 'Вечеринка и эмоции' }
  ];

  let currentFilter = 'all';

  function renderGallery() {
    const container = document.getElementById('galleryContainer');
    if (!container) return;

    let filtered = portfolioItems;
    if (currentFilter !== 'all') {
      filtered = portfolioItems.filter(item => item.category === currentFilter);
    }

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-gallery-msg"><i class="fa-regular fa-images"></i> В этой категории пока нет фотографий.</div>`;
      return;
    }

    let html = '';
    for (let item of filtered) {
      let additionalClass = '';
      if (item.typeHint === 'portrait') additionalClass = 'item-tall';
      if (item.typeHint === 'landscape') additionalClass = 'item-wide';
      
      html += `
        <div class="gallery-item ${additionalClass}" data-category="${item.category}">
          <img src="${item.src}" alt="${item.alt}" loading="lazy">
          <div class="photo-overlay"><span>${item.category === 'wedding' ? '💍' : '🥂'} ${item.alt}</span></div>
        </div>
      `;
    }
    container.innerHTML = html;

    // Добавляем обработчики для открытия модального окна
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        if (img) openModal(img.src);
      });
    });
  }

  function openModal(src) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    modalImg.src = src;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const modal = document.getElementById('imageModal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Настройка фильтров
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      renderGallery();
    });
  });

  // Модальное окно
  const modal = document.getElementById('imageModal');
  const modalClose = document.querySelector('.modal-close');
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  modalClose.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });

  // Запуск
  renderGallery();
</script>
</body>
</html>
